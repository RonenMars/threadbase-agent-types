name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      # OIDC token used by @semantic-release/npm for npm Trusted Publishing.
      # With a trusted publisher configured on npmjs.com (repo + release.yml
      # workflow), npm mints a short-lived token from this OIDC identity at
      # publish time — no long-lived NPM_TOKEN secret needed. Also enables
      # automatic provenance attestation on the published package.
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run semantic-release
        # npm authentication is handled by Trusted Publishing (OIDC): with the
        # job's `id-token: write` permission and a trusted publisher configured
        # on npmjs.com, @semantic-release/npm obtains a short-lived token at
        # publish time. No NODE_AUTH_TOKEN / NPM_TOKEN secret is required.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
